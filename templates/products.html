{% extends "base.html" %}

{% block content %}
    <h2>Products</h2>
    {% if products %}
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr>
                    <td>{{ p.id }}</td>
                    <td>{{ p.name }}</td>
                    <td>${{ p.price | round(2) }}</td>
                    <td>
                        <form method="POST" action="/products/delete/{{ p.id }}">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p class="text-muted">No products available.</p>
    {% endif %}

    <div class="card mt-4 p-4" style="max-width: 400px;">
        <h4>Add Product</h4>
        <form method="POST" action="/products">
            <div class="mb-3">
                <input class="form-control" name="name" placeholder="Product name" required>
            </div>
            <div class="mb-3">
                <input class="form-control" name="price" placeholder="Price" required>
            </div>
            <button type="submit" class="btn btn-primary">Add Product</button>
        </form>
    </div>
{% endblock %}
