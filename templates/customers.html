{% extends "base.html" %}

{% block content %}
    <h2>Customers</h2>
    {% if customers %}
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for c in customers %}
                <tr>
                    <td>{{ c.id }}</td>
                    <td>{{ c.name }}</td>
                    <td>
                        <form method="POST" action="/customers/delete/{{ c.id }}">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p class="text-muted">No customers yet.</p>
    {% endif %}

    <div class="card mt-4 p-4" style="max-width: 400px;">
        <h4>Add Customer</h4>
        <form method="POST" action="/customers">
            <div class="mb-3">
                <input class="form-control" name="name" placeholder="Customer name" required>
            </div>
            <button type="submit" class="btn btn-primary">Add Customer</button>
        </form>
    </div>
{% endblock %}
